<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="author" content="Esri"/>
<title>Flight Simulator</title>
<link rel="shortcut icon" href="img/favicon.ico"/>
<link rel="stylesheet" href="css/flightindicators.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
#container span {
	float: left;
}
</style>
</head>
<body>
<script src="js/jquery.min.js"></script>
<script src="js/jquery.flightindicators.js"></script>
<div id="container">
	<span id="airspeed"></span>
	<span id="attitude"></span>
	<span id="altimeter"></span>
	<span id="turn_coordinator"></span>
	<span id="heading"></span>
	<span id="variometer"></span>
</div>
<script>
// Dynamic examples
var indicator = {};

indicator.airspeed = $.flightIndicator("#airspeed", "airspeed", {showBox: false});
indicator.attitude = $.flightIndicator("#attitude", "attitude", {roll: 50, pitch: -20, showBox: true});
indicator.altimeter = $.flightIndicator("#altimeter", "altimeter");
indicator.turn_coordinator = $.flightIndicator("#turn_coordinator", "turn_coordinator", {turn: 0});
indicator.heading = $.flightIndicator("#heading", "heading", {heading: 150, showBox: true});
indicator.variometer = $.flightIndicator("#variometer", "variometer", {vario: -5, showBox: true});

function setSize() {
	var size = window.innerWidth / 3;
	for (var ins in indicator) {
		indicator[ins].resize(size);
	}
}
setSize();

// Update at 20Hz
var increment = 0;
setInterval(function() {
	// Airspeed update
	indicator.airspeed.setAirSpeed(80+80*Math.sin(increment/10));

	// Attitude update
	indicator.attitude.setRoll(30*Math.sin(increment/10));
	indicator.attitude.setPitch(50*Math.sin(increment/20));

	// Altimeter update
	indicator.altimeter.setAltitude(10*increment);
	indicator.altimeter.setPressure(1000+3*Math.sin(increment/50));
	increment++;
	
	// TC update
	indicator.turn_coordinator.setTurn(30*Math.sin(increment/10));

	// Heading update
	indicator.heading.setHeading(increment);
	
	// Vario update
	indicator.variometer.setVario(2*Math.sin(increment/10));
	
}, 50);
$(window).on("resize", setSize);
</script>
</body>
</html>
