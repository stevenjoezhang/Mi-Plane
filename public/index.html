<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="author" content="Esri"/>
<title>Mi Plane</title>
<link rel="shortcut icon" href="favicon.ico"/>
<link rel="stylesheet" href="//js.arcgis.com/4.11/esri/css/main.css"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
#screen {
	position: absolute;
	top: 0px;
	left: 0px;
	right: 0px;
	bottom: 0px;
	background-color: #000;
}
#screen-top {
	position: absolute;
	top: 0px;
	left: 0px;
	right: 0px;
	height: calc(50% - 2px);
}
#screen-middle {
	position: absolute;
	top: 50%;
	left: 0px;
	right: 0px;
	bottom: 0px;
}
#forward-map {
	position: absolute;
	top: 0px;
	left: 0px;
	right: 0px;
	bottom: 0px;
}
#left-map {
	position: absolute;
	top: 0px;
	left: 0px;
	bottom: 0px;
	width: 33%;
	margin-left: -2px;
}
#middle-map {
	position: absolute;
	top: 0px;
	bottom: 0px;
	left: 0px;
	width: 33%;
	margin-left: 33%
}
#right-map {
	position: absolute;
	top: 0px;
	right: 0px;
	bottom: 0px;
	width: 34%;
	margin-right: -2px;
}
#map {
	position: absolute;
	top: 0px;
	right: 0px;
	bottom: 0px;
	left: 0px;
}
#plane {
	position: absolute;
	left: 50%;
	top: 50%;
	width: 50px;
	height: 50px;
	margin-left: -25px;
	margin-top: -25px;
	background-image: url(../img/airplane.png);
	background-size: cover;
	background-repeat: no-repeat;
	pointer-events: none;
}
#coordsWidget {
	padding: 7px 15px 5px;
	text-align: right;
}
#logo {
	position: absolute;
	top: 0px;
	left: 10px;
	right: 0px;
	opacity: 0.5;
	font-size: 2.625em;
	line-height: 1em;
	pointer-events: none;
}
#forward-map, #left-map, #right-map {
	pointer-events: none;
}
</style>
</head>
<body>
<script src="js/jquery.min.js"></script>
<script src="js/format.min.js"></script>
<script src="//js.arcgis.com/4.11/dojo/dojo.js"></script>
<div id="screen">
	<div id="screen-top">
		<div id="forward-map"></div>
	</div>
	<div id="screen-middle">
		<div id="left-map"></div>
		<div id="right-map"></div>
		<div id="middle-map">
			<div id="map"></div>
			<div id="plane"></div>
		</div>
	</div>
</div>
<div id="logo">
	Mi Plane
</div>
<script>
window.requestAnimationFrame = window.requestAnimationFrame
	|| window.webkitRequestAnimationFrame
	|| window.mozRequestAnimationFrame
	|| window.oRequestAnimationFrame
	|| window.msRequestAnimationFrame
	|| function(callback) { window.setTimeout(callback, 1000 / 30) };

function ConvertDDToDMS(d, lng) {
	var dir = d < 0 ? lng ? "W" : "S" : lng ? "E" : "N";
	var deg = 0 | (d < 0 ? d = -d : d);
	var min = 0 | d % 1 * 60;
	var sec = (0 | d * 60 % 1 * 60);
	return deg + "° " + format.format("02d")(min) + "' " + format.format("02d")(sec) + "\" " + dir;
}

/* -----------------------------------------------------------------------------------
   Developed by the Applications Prototype Lab
   (c) 2015 Esri | http://www.esri.com/legal/software-license
----------------------------------------------------------------------------------- */

require([
	"esri/Map",
	"esri/Camera",
	"esri/views/MapView",
	"esri/views/SceneView",
	"esri/Viewpoint",
	"esri/geometry/Point",
	"esri/geometry/support/webMercatorUtils",
	"dojo/domReady!"
],
function(
	Map,
	Camera,
	MapView,
	SceneView,
	Viewpoint,
	Point,
	webMercatorUtils
) {
	$(document).ready(function() {
		// Enforce strict mode
		"use strict";

		window.plane = {
			location: {
				x: 779232,
				y: 5780430,
				z: 3000
			},
			attitude: {
				pitch: 0,
				roll: 0,
				yaw: 0
			},
			speed: 200,
			heading: 0
		}

		var location = new Point({
			x: plane.location.x,
			y: plane.location.y,
			z: plane.location.z,
			spatialReference: {
				wkid: 102100
			}
		});

		fetch("/port").then(response => {
			return response.text();
		}).then(data => {
			var port = data,
				protocol = location.protocol == "https:" ? "wss:" : "ws:";
			window.ws = new WebSocket(`${protocol}//${window.location.hostname}:${port}`);
			ws.onopen = function() {
				console.log("Websocket connection is successful");
			};

			ws.onmessage = function(event) {
				plane = JSON.parse(event.data);
			};

			ws.onerror = function() {
				console.log("Websocket connection failed, please refresh the page and try again");
			};
		});

		// Initialize maps and views
		var main = new Map({
			basemap: "satellite"
		});
		var viewMain = new MapView({
			container: "map",
			map: main,
			zoom: 12,
			rotation: 0,
			center: location
		});

		var map = new Map({
			basemap: "satellite",
			ground: "world-elevation"
		});
		var viewForward = new SceneView({
			container: "forward-map",
			map: map,
			qualityProfile: "high",
			environment: {
				lighting: {
					date: Date.now(),
					directShadowsEnabled: true,
					ambientOcclusionEnabled: true
				},
				atmosphere: {
					quality: "high"
				}
			},
			camera: {
				heading: 0,
				position: location,
				tilt: 85
			}
		});
		var viewLeft = new SceneView({
			container: "left-map",
			map: map,
			qualityProfile: "high",
			environment: {
				lighting: {
					date: Date.now(),
					directShadowsEnabled: true,
					ambientOcclusionEnabled: true
				},
				atmosphere: {
					quality: "high"
				}
			},
			camera: {
				heading: 270,
				position: location,
				tilt: 80
			}
		});
		var viewRight = new SceneView({
			container: "right-map",
			map: map,
			qualityProfile: "high",
			environment: {
				lighting: {
					date: Date.now(),
					directShadowsEnabled: true,
					ambientOcclusionEnabled: true
				},
				atmosphere: {
					quality: "high"
				}
			},
			camera: {
				heading: 90,
				position: location,
				tilt: 80
			}
		});

		viewMain.ui.components = ["compass", "zoom"];
		viewMain.ui.add($(`<div id="coordsWidget" class="esri-widget esri-component"></div>`)[0], "bottom-right");

		viewForward.ui.components = [];
		viewLeft.ui.components = [];
		viewRight.ui.components = [];

		function draw() {
			location.x = plane.location.x;
			location.y = plane.location.y;
			location.z = plane.location.z;

			viewMain.center = location;
			viewMain.rotation = -plane.heading;
			viewForward.camera = new Camera({
				heading: plane.heading + plane.attitude.yaw,
				position: location,
				tilt: 85 + plane.attitude.pitch
			});
			viewLeft.camera = new Camera({
				heading: plane.heading - 90,
				position: location,
				tilt: 80 + plane.attitude.roll
			});
			viewRight.camera = new Camera({
				heading: plane.heading + 90,
				position: location,
				tilt: 80 - plane.attitude.roll
			});

			var geographic = webMercatorUtils.webMercatorToGeographic(location);
			$("#coordsWidget").html(ConvertDDToDMS(geographic.x, true) + "<br/>" + ConvertDDToDMS(geographic.y, false))

			requestAnimationFrame(draw);
		}

		draw();
	});
});
</script>
</body>
</html>
