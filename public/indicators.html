<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="author" content="Esri"/>
<title>Mi Plane</title>
<link rel="shortcut icon" href="favicon.ico"/>
<link rel="stylesheet" href="css/flightindicators.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
body {
	background-color: #333;
}
#container span {
	float: left;
}
</style>
</head>
<body>
<script src="js/jquery.min.js"></script>
<script src="js/jquery.flightindicators.js"></script>
<div id="container">
	<span id="airspeed"></span>
	<span id="attitude"></span>
	<span id="altimeter"></span>
	<span id="turn_coordinator"></span>
	<span id="heading"></span>
	<span id="variometer"></span>
</div>
<script>
var indicator = {};

indicator.airspeed = $.flightIndicator("#airspeed", "airspeed");
indicator.attitude = $.flightIndicator("#attitude", "attitude", {roll: 50, pitch: -20});
indicator.altimeter = $.flightIndicator("#altimeter", "altimeter");
indicator.turn_coordinator = $.flightIndicator("#turn_coordinator", "turn_coordinator", {turn: 0});
indicator.heading = $.flightIndicator("#heading", "heading", {heading: 150});
indicator.variometer = $.flightIndicator("#variometer", "variometer", {vario: -5});

function setSize() {
	var size = window.innerWidth > window.innerHeight ? window.innerWidth / 3.1 : window.innerWidth / 2.1;
	for (var ins in indicator) {
		indicator[ins].resize(size);
	}
}
setSize();

function wsinit(port, protocol) {
	window.ws = new WebSocket(`${protocol}//${window.location.hostname}:${port}`);
	ws.onopen = function() {
		console.log("Websocket connection is successful");
	};

	ws.onmessage = function(event) {
		plane = JSON.parse(event.data);
		// Airspeed update
		indicator.airspeed.setAirSpeed(plane.speed * 1.943844);
		// Attitude update
		indicator.attitude.setRoll(-plane.attitude.roll);
		indicator.attitude.setPitch(plane.attitude.pitch);
		// Altimeter update
		indicator.altimeter.setAltitude(plane.location.z / 0.3048);
		indicator.altimeter.setPressure(Math.pow((1 - plane.location.z / 44300), 5.256) * 1013.25);
		// TC update
		indicator.turn_coordinator.setTurn(0);
		// Heading update
		indicator.heading.setHeading(plane.heading);
		// Vario update
		indicator.variometer.setVario(plane.vspeed * 60 / 304.8);
	};

	ws.onclose = function() {
		console.log("Websocket connection failed, please refresh the page and try again");
		setTimeout(function() {
			wsinit(port, protocol);
		}, 5000);
	};
}

fetch("/port").then(response => {
	return response.text();
}).then(data => {
	var port = data,
		protocol = location.protocol == "https:" ? "wss:" : "ws:";
	wsinit(port, protocol)
});

$(window).on("resize", setSize);
</script>
</body>
</html>
