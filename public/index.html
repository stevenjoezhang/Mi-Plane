<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mi Plane</title>
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" href="//js.arcgis.com/4.14/esri/css/main.css">
<link rel="stylesheet" href="/css/style.css">
<style>
#screen {
	position: absolute;
	top: 0px;
	left: 0px;
	right: 0px;
	bottom: 0px;
	background-color: #000;
	display: grid;
	grid-gap: 2px;
	grid-template-columns: 1fr 1fr 1fr;
	grid-template-rows: 1fr 1fr;
}
#forward-map {
	grid-area: 1 / 1 / 2 / 4;
}
#left-map {
	grid-area: 2 / 1 / 3 / 2;
}
#middle-map {
	grid-area: 2 / 2 / 3 / 3;
	position: relative;
}
#right-map {
	grid-area: 2 / 3 / 3 / 4;
}
#map {
	position: absolute;
	top: 0px;
	right: 0px;
	bottom: 0px;
	left: 0px;
}
#plane {
	position: absolute;
	left: 50%;
	top: 50%;
	width: 50px;
	height: 50px;
	margin-left: -25px;
	margin-top: -25px;
	background-image: url(img/airplane.png);
	background-size: cover;
	background-repeat: no-repeat;
	pointer-events: none;
}
#coordsWidget {
	padding: 5px 8px 3px;
	text-align: right;
}
#logo {
	position: absolute;
	top: 10px;
	left: 10px;
	opacity: 0.5;
	font-size: 2.625em;
	line-height: 1em;
	pointer-events: none;
}
#forward-map, #left-map, #right-map {
	pointer-events: none;
}
</style>
</head>
<body>
<script src="/js/format.min.js"></script>
<script src="//js.arcgis.com/4.14/dojo/dojo.js"></script>
<div id="screen">
	<div id="forward-map"></div>
	<div id="left-map"></div>
	<div id="middle-map">
		<div id="map"></div>
		<div id="plane"></div>
	</div>
	<div id="right-map"></div>
</div>
<div id="logo">
	Mi Plane
</div>
<script>
window.requestAnimationFrame = window.requestAnimationFrame
	|| window.webkitRequestAnimationFrame
	|| window.mozRequestAnimationFrame
	|| window.oRequestAnimationFrame
	|| window.msRequestAnimationFrame
	|| function(callback) { window.setTimeout(callback, 1000 / 30) };

function ConvertDDToDMS(d, lng) {
	var dir = d < 0 ? lng ? "W" : "S" : lng ? "E" : "N";
	var deg = 0 | (d < 0 ? d = -d : d);
	var min = 0 | d % 1 * 60;
	var sec = (0 | d * 60 % 1 * 60);
	return deg + "° " + format.format("02d")(min) + "' " + format.format("02d")(sec) + "\" " + dir;
}

/* -----------------------------------------------------------------------------------
   Developed by the Applications Prototype Lab
   (c) 2015 Esri | http://www.esri.com/legal/software-license
----------------------------------------------------------------------------------- */

require([
	"esri/Map",
	"esri/Camera",
	"esri/views/MapView",
	"esri/views/SceneView",
	"esri/Viewpoint",
	"esri/geometry/Point",
	"esri/geometry/support/webMercatorUtils",
	"dojo/domReady!"
],
(
	Map,
	Camera,
	MapView,
	SceneView,
	Viewpoint,
	Point,
	webMercatorUtils
) => {
	// Enforce strict mode
	"use strict";

	window.plane = {
		position: {
			x: 12988000,
			y: 4865000,
			z: 3000
		},
		attitude: {
			pitch: 0,
			roll: 0,
			yaw: 0
		},
		speed: 120,
		heading: 270
	}

	var position = new Point({
		...plane.position,
		spatialReference: {
			wkid: 102100
		}
	});

	var protocol = location.protocol.replace("http", "ws");

	function wsinit() {
		window.ws = new WebSocket(`${protocol}//${location.host}`);
		ws.onopen = function() {
			console.log("Websocket connection is successful");
		};

		ws.onmessage = function(event) {
			plane = JSON.parse(event.data);
		};

		ws.onclose = function() {
			console.log("Websocket connection failed, please refresh the page and try again");
			setTimeout(function() {
				wsinit();
			}, 5000);
		};
	}
	wsinit();

	// Initialize maps and views
	var main = new Map({
		basemap: "satellite"
	});
	var viewMain = new MapView({
		container: "map",
		map: main,
		zoom: 12,
		rotation: 0,
		center: position
	});

	var map = new Map({
		basemap: "satellite",
		ground: "world-elevation"
	});
	var viewForward = new SceneView({
		container: "forward-map",
		map: map,
		environment: {
			lighting: {
				date: Date.now(),
				directShadowsEnabled: true,
				ambientOcclusionEnabled: true
			},
			atmosphere: {
				quality: "high"
			}
		},
		camera: {
			heading: 0,
			position,
			tilt: 85
		}
	});
	var viewLeft = new SceneView({
		container: "left-map",
		map: map,
		environment: {
			lighting: {
				date: Date.now(),
				directShadowsEnabled: true,
				ambientOcclusionEnabled: true
			},
			atmosphere: {
				quality: "high"
			}
		},
		camera: {
			heading: 270,
			position,
			tilt: 80
		}
	});
	var viewRight = new SceneView({
		container: "right-map",
		map: map,
		environment: {
			lighting: {
				date: Date.now(),
				directShadowsEnabled: true,
				ambientOcclusionEnabled: true
			},
			atmosphere: {
				quality: "high"
			}
		},
		camera: {
			heading: 90,
			position,
			tilt: 80
		}
	});

	viewMain.ui.components = ["compass", "zoom"];
	let coordsWidget = document.createElement("div");
	coordsWidget.id = "coordsWidget";
	coordsWidget.classList.add("esri-widget", "esri-component");
	viewMain.ui.add(coordsWidget, "bottom-right");

	viewForward.ui.components = [];
	viewLeft.ui.components = [];
	viewRight.ui.components = [];

	function draw() {
		position.x = plane.position.x;
		position.y = plane.position.y;
		position.z = plane.position.z;

		viewMain.center = position;
		viewMain.rotation = -plane.heading;
		viewForward.camera = new Camera({
			heading: plane.heading + plane.attitude.yaw,
			position,
			tilt: 85 + plane.attitude.pitch
		});
		viewLeft.camera = new Camera({
			heading: plane.heading - 90,
			position,
			tilt: 80 + plane.attitude.roll
		});
		viewRight.camera = new Camera({
			heading: plane.heading + 90,
			position,
			tilt: 80 - plane.attitude.roll
		});

		var geographic = webMercatorUtils.webMercatorToGeographic(position);
		document.getElementById("coordsWidget").innerHTML = ConvertDDToDMS(geographic.x, true) + "<br>" + ConvertDDToDMS(geographic.y, false);

		requestAnimationFrame(draw);
	}

	draw();
});
</script>
</body>
</html>
