<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="author" content="Mimi"/>
<title>Mi Plane</title>
<link rel="shortcut icon" href="favicon.ico"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
@font-face {
	font-family: "7Seg";
	src: url(fonts/7Segment.ttf) format("truetype");
}
.seven-seg input {
	font-family: "7Seg";
	font-size: 3em;
	background-color: #110F0F;
	color: #CCC;
}
body {
	background-color: #333;
}
span {
	display: block;
	text-transform: uppercase;
}
#container {
	display: flex;
	flex-wrap: wrap;
	padding: 10px;
	text-align: center;
}
#container > div {
	background-color: #888;
	border-radius: 20px;
	border: 1px solid #FFF;
	margin: 10px;
	padding: 20px;
	position: relative;
}
.button {
	padding: 5px 10px 0px 10px;
	margin-bottom: 20px;
	border: 5px solid #FFF;
}
.button:nth-last-of-type(1) {
	margin-bottom: 0px;
}
.button span:nth-of-type(1), .button span:nth-of-type(2) {
	font-size: 2em;
	line-height: 1em;
}
.light {
	border: 5px solid #FFF;
	border-radius: 50%;
	background-color: green;
	width: 4em;
	height: 4em;
	position: relative;
	left: 50%;
	transform: translateX(-50%);
}
#fire {
	background-color: red;
}
#master {
	background-color: yellow;
	color: black;
}
#bottom-bottom {
	left: 0px;
	right: 0px;
	bottom: 0px;
	height: 60px;
}
#bottom-bottom-panel {
	top: 0px;
	left: 50%;
}
.rc-panel {
	top: 0px;
	bottom: 0px;
	width: 125px;
}
#panel-speed {
	left: 0px;
}
#panel-altitude {
	left: 125px;
}
#panel-heading {
	left: 250px;
}
#panel-location {
	left: 350px;
	width: 200px;
}
.rc-buttons {
	top: 5px;
	left: 5px;
}
.rc-buttons > .btn {
	padding: 2px 6px;
	font-size: 10px;
}
.rc-heading {
	top: 3px;
	left: 35px;
	font-size: 15px;
	font-weight: 700;
	pointer-events: none;
}
.rc-reading {
	top: 25px;
	left: 35px;
	font-size: 14px;
	pointer-events: none;
}
#dial-location-x {
	font-size: 12px;
	top: 20px;
}
#dial-location-y {
	font-size: 12px;
	top: 37px;
}
</style>
</head>
<body>
<script src="js/jquery.min.js"></script>
<script src="js/format.min.js"></script>
<script src="//js.arcgis.com/4.11/dojo/dojo.js"></script>
<div id="container">
	<div id="warning">
		<div id="fire" class="button">
			<span>Fire</span>
			<span>Warn</span>
			<span>Bell Ccuout</span>
		</div>
		<div id="master" class="button">
			<span>Master</span>
			<span>Caution</span>
			<span>Push To Reset</span>
		</div>
	</div>
	<div id="autopilot">
		<div class="button">
			<span>Auto</span>
			<span>Pilot</span>
		</div>
		<div class="light"></div>
	</div>
	<div id="speed">
		<span>Speed</span>
		<div class="seven-seg">
			<input type="text" maxlength="6" size="6" readonly="readonly"/>
		</div>
	</div>
	<div id="heading">
		<span>HDG/TRK</span>
		<div class="seven-seg">
			<input type="text" maxlength="6" size="6" readonly="readonly"/>
		</div>
	</div>
	<div id="vs">
		<span>VS/FPA</span>
		<div class="seven-seg">
			<input type="text" maxlength="6" size="6" readonly="readonly"/>
		</div>
	</div>
	<div id="altitude">
		<span>Altitude</span>
		<div class="seven-seg">
			<input type="text" maxlength="6" size="6" readonly="readonly"/>
		</div>
	</div>
	<div id="bottom-bottom">
		<div id="bottom-bottom-panel">
			<div id="panel-speed" class="rc-panel">
				<div class="rc-buttons btn-group-vertical" role="group" aria-label="">
					<button id="button-speed-up" type="button" class="btn btn-default"></button>
					<button id="button-speed-dn" type="button" class="btn btn-default"></button>
				</div>
				<div class="rc-heading">Speed</div>
				<div class="rc-reading" id="dial-speed"></div>
			</div>
			<div id="panel-altitude" class="rc-panel">
				<div class="rc-buttons btn-group-vertical" role="group" aria-label="">
					<button id="button-altitude-up" type="button" class="btn btn-default"></button>
					<button id="button-altitude-dn" type="button" class="btn btn-default"></button>
				</div>
				<div class="rc-heading">Altitude</div>
				<div class="rc-reading" id="dial-altitude"></div>
			</div>
			<div id="panel-heading" class="rc-panel">
				<div class="rc-buttons btn-group-vertical" role="group" aria-label="">
					<button id="button-heading-up" type="button" class="btn btn-default"></button>
					<button id="button-heading-dn" type="button" class="btn btn-default"></button>
				</div>
				<div class="rc-heading">Heading</div>
				<div class="rc-reading" id="dial-heading"></div>
			</div>
			<div id="panel-location" class="rc-panel">
				<div class="rc-heading">Location</div>
				<div class="rc-reading" id="dial-location-x"></div>
				<div class="rc-reading" id="dial-location-y"></div>
			</div>
		</div>
	</div>
</div>
<script>
function ConvertDDToDMS(d, lng) {
	var dir = d < 0 ? lng ? "W" : "S" : lng ? "E" : "N";
	var deg = 0 | (d < 0 ? d = -d : d);
	var min = 0 | d % 1 * 60;
	var sec = (0 | d * 60 % 1 * 60);
	return deg + "° " + format.format("02d")(min) + "' " + format.format("02d")(sec) + "\" " + dir;
}

require([
	"esri/geometry/Point",
	"esri/geometry/support/webMercatorUtils"
],
function (
	Point,
	webMercatorUtils
) {
	$(document).ready(function() {
		// Enforce strict mode
		"use strict";

		window.plane = {
			x: 779232,
			y: 5780430,
			z: 3000,
			speed: 200,
			heading: 0
		}

		var location = new Point({
			x: plane.x,
			y: plane.y,
			z: plane.z,
			spatialReference: {
				wkid: 102100
			}
		});

		fetch("/port").then(response => {
			return response.text();
		}).then(data => {
			var port = data,
				protocol = location.protocol == "https:" ? "wss:" : "ws:";
			window.ws = new WebSocket(`${protocol}//${window.location.hostname}:${port}`);
			ws.onopen = function () {
				console.log("Websocket connection is successful");
			};

			ws.onmessage = function (event) {
				plane = JSON.parse(event.data);
				update();
			};

			ws.onerror = function () {
				console.log("Websocket connection failed, please refresh the page and try again");
			};
		});

		function update() {

			location.x = plane.x;
			location.y = plane.y;
			location.z = plane.z;

			var geographic = webMercatorUtils.webMercatorToGeographic(location);

			$("#speed input").val(format.format(",")(plane.speed));
			$("#altitude input").val(format.format(",")(location.z));
			$("#heading input").val(format.format(",")(plane.heading));
			$("#dial-location-x").html(ConvertDDToDMS(geographic.x, true));
			$("#dial-location-y").html(ConvertDDToDMS(geographic.y, false));
		}
		update();
	});
});

$("#button-speed-up").click(function() {
	speed += 100;
});
$("#button-speed-dn").click(function() {
	speed -= 100;
	if (speed < 0) {
		speed = 0;
	}
});
$("#button-altitude-up").click(function() {
	location.z += 100;
});
$("#button-altitude-dn").click(function() {
	location.z -= 100;
	if (location.z < 0) {
		location.z = 0;
	}
});
$("#button-heading-up").click(function() {
	heading += 10;
	if (heading > 360) {
		heading -= 360;
	}
});
$("#button-heading-dn").click(function() {
	heading -= 10;
	if (heading < 0) {
		heading += 360;
	}
});
</script>
</body>
</html>
