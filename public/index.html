<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mi Plane</title>
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" href="//js.arcgis.com/4.14/esri/css/main.css">
<link rel="stylesheet" href="/css/style.css">
<style>
#screen {
	position: absolute;
	top: 0px;
	left: 0px;
	right: 0px;
	height: 100%;
	background-color: #000;
	display: grid;
	grid-gap: 2px;
	grid-template-columns: 1fr 1fr 1fr;
	grid-template-rows: 1fr 1fr;
}
#forward-map {
	grid-area: 1 / 1 / 2 / 4;
}
#left-map {
	grid-area: 2 / 1 / 3 / 2;
}
#middle-map {
	grid-area: 2 / 2 / 3 / 3;
	position: relative;
}
#right-map {
	grid-area: 2 / 3 / 3 / 4;
}
#map {
	position: absolute;
	top: 0px;
	right: 0px;
	bottom: 0px;
	left: 0px;
}
#plane {
	position: absolute;
	left: 50%;
	top: 50%;
	width: 50px;
	height: 50px;
	margin-left: -25px;
	margin-top: -25px;
	background-image: url(img/airplane.png);
	background-size: cover;
	background-repeat: no-repeat;
	pointer-events: none;
}
#coordsWidget {
	padding: 5px 8px 3px;
	text-align: right;
}
#logo {
	position: absolute;
	top: 10px;
	left: 10px;
	opacity: 0.5;
	font-size: 2.625em;
	line-height: 1em;
	pointer-events: none;
}
#forward-map, #left-map, #right-map {
	pointer-events: none;
}
</style>
</head>
<body>
<script src="https://js.arcgis.com/4.17/dojo/dojo.js"></script>
<div id="screen">
	<div id="forward-map"></div>
	<div id="left-map"></div>
	<div id="middle-map">
		<div id="map"></div>
		<div id="plane"></div>
	</div>
	<div id="right-map"></div>
</div>
<div id="logo">
	Mi Plane
</div>
<script src="/js/websocket.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
