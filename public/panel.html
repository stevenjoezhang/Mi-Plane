<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mi Plane</title>
<link rel="shortcut icon" href="/favicon.ico">
<link rel="stylesheet" href="/css/style.css">
<style>
@font-face {
	font-family: "7Seg";
	src: url(fonts/7Segment.ttf) format("truetype");
}
body {
	background-color: #333;
	-webkit-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	user-select: none;
}
#container {
	display: flex;
	flex-wrap: wrap;
	padding: 10px;
	text-align: center;
}
#container > div {
	background-color: #888;
	border-radius: 20px;
	border: 1px solid #FFF;
	margin: 10px;
	padding: 20px;
	position: relative;
}
.button {
	padding: 5px 10px 0px 10px;
	margin-bottom: 20px;
	border: 5px solid #FFF;
	cursor: pointer;
}
.button:nth-last-of-type(1) {
	margin-bottom: 0px;
}
.button span:nth-of-type(1), .button span:nth-of-type(2) {
	font-size: 2em;
	line-height: 1em;
}
span {
	display: block;
	text-transform: uppercase;
}
.light {
	border: 5px solid #FFF;
	border-radius: 50%;
	background-color: green;
	width: 4em;
	height: 4em;
	position: relative;
	left: 50%;
	transform: translateX(-50%);
}
input.seven-seg {
	display: block;
	font-family: "7Seg";
	font-size: 3em;
	background-color: #110F0F;
	color: #CCC;
	cursor: default;
}
#fire {
	background-color: red;
}
#master {
	background-color: yellow;
	color: black;
}
</style>
</head>
<body>
<div id="container">
	<div id="warning">
		<div id="fire" class="button">
			<span>Fire</span>
			<span>Warn</span>
			<span>Bell Cutout</span>
		</div>
		<div id="master" class="button">
			<span>Master</span>
			<span>Caution</span>
			<span>Push To Reset</span>
		</div>
	</div>
	<div id="time">
		<span>Time</span>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
		<br>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
	</div>
	<div id="autopilot">
		<div class="button">
			<span>Auto</span>
			<span>Pilot</span>
		</div>
		<div class="light"></div>
	</div>
	<div id="speed">
		<span>Speed</span>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
	</div>
	<div id="heading">
		<span>HDG/TRK</span>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
	</div>
	<div id="vs">
		<span>VS/FPA</span>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
	</div>
	<div id="altitude">
		<span>Altitude</span>
		<input class="seven-seg" type="text" maxlength="6" size="6" readonly="readonly">
	</div>
	<div id="bottom-bottom">
		<div id="bottom-bottom-panel">
			<div id="panel-speed" class="rc-panel">
				<div role="group" aria-label="">
					<button id="button-speed-up" type="button">+</button>
					<button id="button-speed-dn" type="button">-</button>
				</div>
				<div class="rc-heading">Speed</div>
				<div class="rc-reading" id="dial-speed"></div>
			</div>
			<div id="panel-altitude" class="rc-panel">
				<div role="group" aria-label="">
					<button id="button-altitude-up" type="button">+</button>
					<button id="button-altitude-dn" type="button">-</button>
				</div>
				<div class="rc-heading">Altitude</div>
				<div class="rc-reading" id="dial-altitude"></div>
			</div>
			<div id="panel-heading" class="rc-panel">
				<div role="group" aria-label="">
					<button id="button-heading-up" type="button">+</button>
					<button id="button-heading-dn" type="button">-</button>
				</div>
				<div class="rc-heading">Heading</div>
				<div class="rc-reading" id="dial-heading"></div>
			</div>
		</div>
	</div>
</div>
<script src="/js/d3-format.min.js"></script>
<script src="/js/websocket.js"></script>
<script src="/js/panel.js"></script>
</body>
</html>
